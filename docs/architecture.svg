<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 648" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <style>
    .bg-frame { fill:#f8fafc; stroke:#e5e7eb; }
    .card     { fill:#ffffff; stroke:#e5e7eb; }
    .flowbox  { fill:#ffffff; stroke:#e5e7eb; }
    .fg       { fill:#111827; }
    .muted    { fill:#6b7280; }
    .mstrong  { fill:#374151; }
    .divider  { stroke:#e5e7eb; }
    .arrow    { stroke:#9ca3af; fill:#9ca3af; }
    @media (prefers-color-scheme: dark) {
      .bg-frame { fill:#0d1117; stroke:#30363d; }
      .card     { fill:#161b22; stroke:#30363d; }
      .flowbox  { fill:#161b22; stroke:#30363d; }
      .fg       { fill:#e6edf3; }
      .muted    { fill:#8b949e; }
      .mstrong  { fill:#adbac7; }
      .divider  { stroke:#30363d; }
      .arrow    { stroke:#6e7681; fill:#6e7681; }
    }
  </style>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- frame -->
  <rect x="1" y="1" width="918" height="646" rx="20" class="bg-frame" stroke-width="1.5"/>

  <!-- ===== Header ===== -->
  <rect x="36" y="26" width="34" height="34" rx="9" fill="#6366f1" fill-opacity="0.14" stroke="#6366f1" stroke-opacity="0.5"/>
  <rect x="44" y="34" width="18" height="3" rx="1.5" fill="#6366f1"/>
  <rect x="44" y="41" width="18" height="3" rx="1.5" fill="#6366f1" fill-opacity="0.7"/>
  <rect x="44" y="48" width="18" height="3" rx="1.5" fill="#6366f1" fill-opacity="0.45"/>
  <text x="80" y="50" font-size="27" font-weight="700" class="fg">OpenClaw Skill Manager</text>
  <text x="80" y="74" font-size="13.5" class="muted">Three-tier lazy loading · survival-oriented skill lifecycle</text>

  <!-- 98% badge -->
  <rect x="668" y="24" width="216" height="56" rx="28" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.5"/>
  <text x="776" y="50" text-anchor="middle" font-size="17" font-weight="800" fill="#6366f1">~98% LESS</text>
  <text x="776" y="69" text-anchor="middle" font-size="11" class="muted">steady-state skill-context</text>

  <line x1="36" y1="100" x2="884" y2="100" class="divider" stroke-width="1"/>

  <!-- ===== Band B: three tiers ===== -->
  <text x="36" y="128" font-size="12" font-weight="700" letter-spacing="1.5" class="mstrong">THREE-TIER LAZY LOADING</text>
  <text x="884" y="128" text-anchor="end" font-size="11" font-style="italic" class="muted">detail is always one lookup away</text>

  <!-- Tier L1 -->
  <rect x="36" y="142" width="848" height="52" rx="12" class="card" filter="url(#sh)"/>
  <rect x="48" y="156" width="8" height="24" rx="4" fill="#10b981"/>
  <rect x="64" y="156" width="34" height="24" rx="7" fill="#10b981" fill-opacity="0.14" stroke="#10b981" stroke-opacity="0.5"/>
  <text x="81" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#10b981">L1</text>
  <text x="112" y="166" font-size="15" font-weight="700" class="fg">Metadata</text>
  <text x="112" y="184" font-size="12" class="muted">name + one-line description</text>
  <text x="700" y="176" text-anchor="end" font-size="12.5" font-weight="600" class="mstrong">~10–20 tok / skill</text>
  <rect x="720" y="156" width="150" height="24" rx="12" fill="#10b981" fill-opacity="0.14"/>
  <text x="795" y="172" text-anchor="middle" font-size="11.5" font-weight="600" fill="#10b981">at startup</text>

  <!-- Tier L2 -->
  <rect x="36" y="208" width="848" height="52" rx="12" class="card" filter="url(#sh)"/>
  <rect x="48" y="222" width="8" height="24" rx="4" fill="#f59e0b"/>
  <rect x="64" y="222" width="34" height="24" rx="7" fill="#f59e0b" fill-opacity="0.16" stroke="#f59e0b" stroke-opacity="0.5"/>
  <text x="81" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b">L2</text>
  <text x="112" y="232" font-size="15" font-weight="700" class="fg">Document</text>
  <text x="112" y="250" font-size="12" class="muted">the full SKILL.md</text>
  <text x="700" y="242" text-anchor="end" font-size="12.5" font-weight="600" class="mstrong">~200–2000 tok / skill</text>
  <rect x="720" y="222" width="150" height="24" rx="12" fill="#f59e0b" fill-opacity="0.16"/>
  <text x="795" y="238" text-anchor="middle" font-size="11.5" font-weight="600" fill="#d97706">on demand</text>

  <!-- Tier L3 -->
  <rect x="36" y="274" width="848" height="52" rx="12" class="card" filter="url(#sh)"/>
  <rect x="48" y="288" width="8" height="24" rx="4" fill="#f43f5e"/>
  <rect x="64" y="288" width="34" height="24" rx="7" fill="#f43f5e" fill-opacity="0.14" stroke="#f43f5e" stroke-opacity="0.5"/>
  <text x="81" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#f43f5e">L3</text>
  <text x="112" y="298" font-size="15" font-weight="700" class="fg">Tools</text>
  <text x="112" y="316" font-size="12" class="muted">executable scripts</text>
  <text x="700" y="308" text-anchor="end" font-size="12.5" font-weight="600" class="mstrong">variable cost</text>
  <rect x="720" y="288" width="150" height="24" rx="12" fill="#f43f5e" fill-opacity="0.14"/>
  <text x="795" y="304" text-anchor="middle" font-size="11.5" font-weight="600" fill="#f43f5e">at execution</text>

  <!-- ===== Token comparison ===== -->
  <text x="36" y="360" font-size="12" font-weight="700" letter-spacing="1.5" class="mstrong">STEADY-STATE CONTEXT PER TURN</text>

  <!-- naive -->
  <text x="36" y="384" font-size="12" font-weight="600" class="fg">Load every doc</text>
  <text x="36" y="399" font-size="10.5" class="muted">64 × ~300 tok</text>
  <rect x="250" y="376" width="600" height="22" rx="6" fill="#ef4444" fill-opacity="0.9"/>
  <text x="840" y="392" text-anchor="end" font-size="12" font-weight="700" fill="#ffffff">19,200 tok</text>

  <!-- lazy -->
  <text x="36" y="420" font-size="12" font-weight="600" class="fg">Lazy (L1 only)</text>
  <text x="36" y="435" font-size="10.5" class="muted">20 × ~15 tok</text>
  <rect x="250" y="412" width="11" height="22" rx="5" fill="#10b981"/>
  <text x="271" y="428" font-size="12" font-weight="700" fill="#10b981">300 tok</text>
  <text x="330" y="428" font-size="11" font-style="italic" class="muted">— a 64× reduction, same capability</text>

  <line x1="36" y1="460" x2="884" y2="460" class="divider" stroke-width="1"/>

  <!-- ===== Band C: architecture flow ===== -->
  <text x="36" y="486" font-size="12" font-weight="700" letter-spacing="1.5" class="mstrong">ARCHITECTURE</text>

  <!-- smart_evolver -->
  <rect x="36" y="500" width="210" height="68" rx="12" class="flowbox" filter="url(#sh)"/>
  <circle cx="54" cy="518" r="4" fill="#6366f1"/>
  <text x="68" y="523" font-size="14" font-weight="700" class="fg">smart_evolver.py</text>
  <text x="52" y="546" font-size="11" class="muted">weekly loop · score · clean up</text>

  <!-- arrow -->
  <text x="266" y="528" text-anchor="middle" font-size="10" class="muted">uses</text>
  <line x1="250" y1="534" x2="282" y2="534" class="arrow" stroke-width="1.6"/>
  <path d="M282 534 l-7 -3.5 v7 z" class="arrow"/>

  <!-- skill_manager -->
  <rect x="288" y="500" width="210" height="68" rx="12" class="flowbox" filter="url(#sh)"/>
  <circle cx="306" cy="518" r="4" fill="#6366f1"/>
  <text x="320" y="523" font-size="14" font-weight="700" class="fg">skill_manager.py</text>
  <text x="304" y="546" font-size="11" class="muted">L1 index · stats · lifecycle</text>

  <!-- arrow -->
  <text x="520" y="528" text-anchor="middle" font-size="10" class="muted">reads / writes</text>
  <line x1="502" y1="534" x2="534" y2="534" class="arrow" stroke-width="1.6"/>
  <path d="M534 534 l-7 -3.5 v7 z" class="arrow"/>

  <!-- storage -->
  <rect x="540" y="500" width="344" height="20" rx="6" fill="#10b981" fill-opacity="0.13" stroke="#10b981" stroke-opacity="0.45"/>
  <text x="552" y="514" font-size="11" font-weight="600" class="fg">skill_indexes/*.json</text>
  <text x="874" y="514" text-anchor="end" font-size="10" font-weight="600" fill="#10b981">L1 metadata</text>

  <rect x="540" y="524" width="344" height="20" rx="6" fill="#f59e0b" fill-opacity="0.14" stroke="#f59e0b" stroke-opacity="0.45"/>
  <text x="552" y="538" font-size="11" font-weight="600" class="fg">~/skills/&lt;name&gt;/SKILL.md</text>
  <text x="874" y="538" text-anchor="end" font-size="10" font-weight="600" fill="#d97706">L2 document</text>

  <rect x="540" y="548" width="344" height="20" rx="6" fill="#6b7280" fill-opacity="0.13" stroke="#6b7280" stroke-opacity="0.4"/>
  <text x="552" y="562" font-size="11" font-weight="600" class="fg">archived_skills/</text>
  <text x="874" y="562" text-anchor="end" font-size="10" font-weight="600" class="muted">retired</text>

  <!-- ===== Lifecycle footer ===== -->
  <text x="36" y="600" font-size="12" font-weight="700" letter-spacing="1.5" class="mstrong">LIFECYCLE</text>
  <g font-size="10.5" font-weight="600" text-anchor="middle">
    <rect x="150" y="590" width="92" height="26" rx="13" fill="#6366f1" fill-opacity="0.10" stroke="#6366f1" stroke-opacity="0.3"/>
    <text x="196" y="607" class="fg">discover</text>
    <text x="251" y="608" font-size="12" class="muted">›</text>
    <rect x="262" y="590" width="92" height="26" rx="13" fill="#6366f1" fill-opacity="0.10" stroke="#6366f1" stroke-opacity="0.3"/>
    <text x="308" y="607" class="fg">evaluate</text>
    <text x="363" y="608" font-size="12" class="muted">›</text>
    <rect x="374" y="590" width="92" height="26" rx="13" fill="#6366f1" fill-opacity="0.10" stroke="#6366f1" stroke-opacity="0.3"/>
    <text x="420" y="607" class="fg">install</text>
    <text x="475" y="608" font-size="12" class="muted">›</text>
    <rect x="486" y="590" width="92" height="26" rx="13" fill="#6366f1" fill-opacity="0.10" stroke="#6366f1" stroke-opacity="0.3"/>
    <text x="532" y="607" class="fg">verify</text>
    <text x="587" y="608" font-size="12" class="muted">›</text>
    <rect x="598" y="590" width="92" height="26" rx="13" fill="#6366f1" fill-opacity="0.10" stroke="#6366f1" stroke-opacity="0.3"/>
    <text x="644" y="607" class="fg">use</text>
    <text x="699" y="608" font-size="12" class="muted">›</text>
    <rect x="710" y="590" width="92" height="26" rx="13" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.4"/>
    <text x="756" y="607" fill="#10b981">re-evaluate</text>
  </g>
</svg>
